<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />

    <!-- Warm the Convex connections during HTML parse so the plan-data fetch
         (.convex.site) and the comments socket (.convex.cloud) start sooner. -->
    <link rel="preconnect" href="https://vibrant-barracuda-527.convex.site" crossorigin />
    <link rel="preconnect" href="https://vibrant-barracuda-527.convex.cloud" crossorigin />

    <title>HTML Plan Host — publish HTML plans to a shareable URL</title>
    <meta
      name="description"
      content="Your coding agent generates an HTML plan, publishes it, and gets back a shareable URL — zero setup. Humans comment inline on any section, no account needed."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HTML Plan Host" />
    <meta property="og:title" content="HTML Plan Host — publish HTML plans to a shareable URL" />
    <meta
      property="og:description"
      content="Your coding agent generates an HTML plan, publishes it, and gets back a shareable URL — zero setup. Humans comment inline on any section, no account needed."
    />
    <meta property="og:url" content="https://html-plan-host.vercel.app" />
    <meta property="og:image" content="https://html-plan-host.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HTML Plan Host — publish HTML plans to a shareable URL" />
    <meta
      name="twitter:description"
      content="Your coding agent generates an HTML plan, publishes it, and gets back a shareable URL — zero setup. Humans comment inline, no account needed."
    />
    <meta name="twitter:image" content="https://html-plan-host.vercel.app/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Discoverable instructions for coding agents that fetch this URL: tells
         them where the publish API lives so "point your agent at the link" works
         without the agent having to guess /llms.txt. Hidden from human visitors. -->
    <noscript>
      HTML Plan Host hosts HTML plans for coding agents. To publish a plan and get
      a shareable URL, read https://html-plan-host.vercel.app/llms.txt — POST
      /provision to mint an API key (no account needed), then POST your HTML to
      /plans. The response includes the shareable URL.
    </noscript>
    <!-- On a plan page, kick off the data fetch immediately (in parallel with the
         JS bundle download) so content is ready the moment the app boots. -->
    <script>
      (function () {
        var m = location.pathname.match(/^\/(?:p|plan)\/(.+)/);
        if (!m) return;
        var site = "%VITE_CONVEX_URL%".replace(".convex.cloud", ".convex.site");
        var slug = decodeURIComponent(m[1]);
        window.__planFetch = fetch(
          site + "/plan.json?slug=" + encodeURIComponent(slug),
        )
          .then(function (r) {
            return r.ok ? r.json() : null;
          })
          .catch(function () {
            return null;
          });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
